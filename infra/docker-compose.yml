services:

  postgres:
    image: postgres:16
    container_name: pulse_postgres
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse123
      POSTGRES_DB: pulsenotify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulsenotify"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: pulse_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"      # AMQP protocol port
      - "15672:15672"    # Management UI port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pulse_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: pulse_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - postgres

  grafana:
    image: grafana/grafana:latest
    container_name: pulse_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  flower:
    image: mher/flower:latest
    container_name: pulse_flower
    command: celery flower --broker=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "5555:5555"
    depends_on:
      - rabbitmq
    
  pushgateway:
    image: prom/pushgateway:latest
    container_name: pulse_pushgateway
    ports:
      - "9091:9091"
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  grafana_data: